<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Resume Analyzer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar">
<div class="logo">Smart<span>Portal</span></div>

<div class="nav-right">
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
</div>
</nav>

<section class="login-page">

<div class="login-box">

<h1>AI Resume Analyzer 🤖</h1>

<form method="POST">

<textarea name="resume"
placeholder="Paste your resume text here..."
style="width:100%;height:180px;padding:15px;border-radius:10px;"></textarea>

<br><br>

<button type="submit" class="blue-btn">Analyze Resume</button>

</form>

{% if score > 0 %}

<hr style="margin:25px 0;">

<h2>Resume Score: {{ score }}/100</h2>

<p><b>Skills Found:</b>
{% for s in skills %}
{{ s }},
{% endfor %}
</p>

<p><b>Suggestions:</b></p>

<ul>
{% for sug in suggestions %}
<li>{{ sug }}</li>
{% endfor %}
</ul>

{% endif %}

</div>

</section>

</body>
</html>
