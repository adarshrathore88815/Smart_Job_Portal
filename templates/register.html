<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | CareerVerse AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>

<body>

<div class="register-page">

<div class="left-side">

<div class="brand">
<div class="logo">CV</div>
<h1>CareerVerse AI</h1>
<p>Your AI-Powered Career Partner</p>
</div>

<h2>Create Account 🚀</h2>
<p class="sub">
Join thousands of students and professionals growing with AI.
</p>

<img src="https://cdn3d.iconscout.com/3d/premium/thumb/woman-working-on-laptop-6299382-5187866.png">

</div>

<div class="right-side">

<form class="register-box" method="POST">

<h2>Register</h2>

<input type="text" name="name" placeholder="Full Name" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="password" name="password" placeholder="Create Password" required>

<input type="password" name="confirm" placeholder="Confirm Password" required>

<button type="submit">Create Account</button>

<p class="bottom-text">
Already have an account?
<a href="/login">Login</a>
</p>

<a href="/" class="back-home">← Back Home</a>

</form>

</div>

</div>

</body>
</html>
