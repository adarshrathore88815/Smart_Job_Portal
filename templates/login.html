<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CareerVerse AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

<div class="login-page">

<div class="left-side">

<div class="brand">
<div class="logo">CV</div>
<h1>CareerVerse AI</h1>
<p>Your AI-Powered Career Partner</p>
</div>

<h2>Welcome Back 👋</h2>
<p class="sub">
Login to continue your job search, resume building and career growth.
</p>

<img src="https://cdn3d.iconscout.com/3d/premium/thumb/man-working-on-laptop-6299381-5187865.png">

</div>

<div class="right-side">

<form class="login-box" method="POST">

<h2>Login</h2>

<input type="email" name="email" placeholder="Enter Email" required>

<input type="password" name="password" placeholder="Enter Password" required>

<div class="row">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit">Login Now</button>

<p class="bottom-text">
Don't have an account?
<a href="/register">Create Account</a>
</p>

<a href="/" class="back-home">← Back Home</a>

</form>

</div>

</div>

</body>
</html>
