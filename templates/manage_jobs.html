<!DOCTYPE html>
<html>
<head>
<title>Manage Jobs</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}

h1{
font-size:50px;
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
background:#111827;
border-radius:20px;
overflow:hidden;
}

th,td{
padding:18px;
border-bottom:1px solid rgba(255,255,255,.08);
text-align:left;
}

th{
background:#1e293b;
}

a{
padding:10px 18px;
border-radius:10px;
background:red;
color:white;
text-decoration:none;
font-weight:bold;
}

.back{
display:inline-block;
margin-top:30px;
background:linear-gradient(90deg,#38bdf8,#9333ea);
}

</style>
</head>

<body>

<h1>💼 Manage Jobs</h1>

<table>

<tr>
<th>ID</th>
<th>Title</th>
<th>Location</th>
<th>Salary</th>
<th>Action</th>
</tr>

{% for job in jobs %}

<tr>

<td>{{ job[0] }}</td>
<td>{{ job[1] }}</td>
<td>{{ job[2] }}</td>
<td>{{ job[3] }}</td>

<td>

<a href="/delete-job/{{ job[0] }}">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

<a href="/admin-dashboard" class="back">
⬅ Back Dashboard
</a>

</body>
</html>
