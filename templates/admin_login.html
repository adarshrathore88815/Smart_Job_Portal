<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#050816,#0b1026,#111827);
overflow:hidden;
color:white;
}

/* BG BLUR */

.blur{
position:absolute;
border-radius:50%;
filter:blur(120px);
opacity:.3;
animation:move 8s infinite alternate;
}

.b1{
width:300px;
height:300px;
background:#38bdf8;
top:-100px;
left:-100px;
}

.b2{
width:350px;
height:350px;
background:#9333ea;
right:-120px;
top:150px;
}

.b3{
width:250px;
height:250px;
background:#22c55e;
bottom:-100px;
left:40%;
}

@keyframes move{
100%{
transform:translateY(40px);
}
}

/* LOGIN BOX */

.login-box{
position:relative;
width:450px;
padding:45px;
border-radius:35px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(12px);
box-shadow:0 0 35px rgba(56,189,248,.12);
z-index:5;
transition:.4s;
}

.login-box:hover{
transform:translateY(-6px);
}

/* ICON */

.icon{
width:110px;
height:110px;
margin:auto;
margin-bottom:25px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:55px;
background:linear-gradient(135deg,#38bdf8,#9333ea);
box-shadow:0 0 30px rgba(56,189,248,.25);
}

/* TITLE */

h1{
text-align:center;
font-size:52px;
margin-bottom:12px;
background:linear-gradient(90deg,#38bdf8,#9333ea);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.sub{
text-align:center;
color:#cbd5e1;
font-size:18px;
margin-bottom:35px;
}

/* INPUT */

.input-box{
margin-bottom:22px;
}

.input-box label{
display:block;
margin-bottom:10px;
font-size:17px;
font-weight:bold;
}

.input-box input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:18px;
background:#0f172a;
color:white;
font-size:17px;
border:1px solid rgba(255,255,255,.08);
transition:.3s;
}

.input-box input:focus{
border:1px solid #38bdf8;
box-shadow:0 0 18px rgba(56,189,248,.20);
}

/* BUTTON */

button{
width:100%;
padding:20px;
border:none;
border-radius:18px;
font-size:22px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(90deg,#38bdf8,#9333ea);
color:white;
transition:.3s;
position:relative;
overflow:hidden;
}

button:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(56,189,248,.25);
}

button::before{
content:'';
position:absolute;
width:50px;
height:250%;
background:rgba(255,255,255,.4);
top:-100px;
left:-120px;
transform:rotate(25deg);
animation:shine 3s infinite;
}

@keyframes shine{
100%{
left:140%;
}
}

/* BACK */

.back{
display:block;
text-align:center;
margin-top:25px;
font-size:18px;
text-decoration:none;
color:#38bdf8;
font-weight:bold;
}

/* MOBILE */

@media(max-width:600px){

.login-box{
width:95%;
padding:30px;
}

h1{
font-size:38px;
}

.icon{
width:90px;
height:90px;
font-size:45px;
}

}

</style>
</head>

<body>

<div class="blur b1"></div>
<div class="blur b2"></div>
<div class="blur b3"></div>

<div class="login-box">

<div class="icon">
👑
</div>

<h1>Admin Login</h1>

<p class="sub">
Secure CareerVerse AI Admin Panel
</p>

<form method="POST" action="/admin-login">

<div class="input-box">

<label>Admin Username</label>

<input
type="text"
name="username"
placeholder="Enter Admin Username"
required>

</div>

<div class="input-box">

<label>Admin Password</label>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

</div>

<button>
🚀 Login To Dashboard
</button>

</form>

<a href="/" class="back">
⬅ Back To Home
</a>

</div>

</body>
</html>
