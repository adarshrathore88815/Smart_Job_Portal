<!DOCTYPE html>
<html>
<head>
<title>Manage Users</title>
</head>
<body>

<h1>All Registered Users 👥</h1>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
</tr>

{% for user in users %}
<tr>
<td>{{ user[0] }}</td>
<td>{{ user[1] }}</td>
<td>{{ user[2] }}</td>
</tr>
{% endfor %}

</table>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
